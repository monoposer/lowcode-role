services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lowcode_role
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10

  opa:
    image: openpolicyagent/opa:0.69.0
    command:
      - "run"
      - "--server"
      - "-w"
      - "--log-level=error"
      - "--addr=:8181"
      - "/bundle"
    ports:
      - "8181:8181"
    volumes:
      - ./.bundle/out:/bundle:ro
    depends_on:
      postgres:
        condition: service_healthy

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DisplayGround — DSL Policy Test</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #1a2332; --border: #2d3a4f; --text: #e7ecf3;
      --muted: #8b9cb3; --accent: #3ecf8e; --accent-dim: #248f5f;
      --danger: #f56565; --code-bg: #0d1117;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; gap: 1rem; align-items: center; }
    header h1 { margin: 0; font-size: 1.1rem; }
    .badge { font-size: 0.7rem; background: var(--accent-dim); padding: 0.15rem 0.5rem; border-radius: 4px; }
    .layout { display: grid; grid-template-columns: 180px 1fr; min-height: calc(100vh - 53px); }
    nav { border-right: 1px solid var(--border); background: var(--panel); padding: 1rem 0; }
    nav button { display: block; width: 100%; text-align: left; padding: 0.6rem 1.25rem; border: none; background: none; color: var(--muted); cursor: pointer; }
    nav button.active { color: var(--text); border-left: 3px solid var(--accent); background: rgba(62,207,142,0.08); }
    main { padding: 1.5rem; }
    .panel { display: none; } .panel.active { display: block; }
    h2 { margin: 0 0 1rem; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; }
    input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--code-bg); color: var(--text); margin-bottom: 0.75rem; font-size: 0.875rem; }
    textarea { font-family: Menlo, monospace; font-size: 0.8rem; min-height: 140px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; }
    .primary { background: var(--accent); color: #0f1419; }
    .secondary { background: var(--border); color: var(--text); }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    pre.out { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; font-size: 0.75rem; max-height: 300px; overflow: auto; white-space: pre-wrap; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.5rem; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); }
    .tag { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; background: var(--border); }
    .tag.published { background: var(--accent-dim); }
    .help { font-size: 0.75rem; color: var(--muted); margin: -0.25rem 0 0.75rem; }
    .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.5rem; margin-bottom: 0.75rem; }
    .field-item { font-size: 0.8rem; display: flex; gap: 0.35rem; align-items: center; }
    .field-item input { width: auto; margin: 0; }
    .toast { position: fixed; bottom: 1rem; right: 1rem; padding: 0.75rem 1rem; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: none; z-index: 99; }
    .toast.error { border-color: var(--danger); }
  </style>
</head>
<body>
  <header>
    <h1>DisplayGround</h1>
    <span class="badge">DSL v1 → OPA</span>
    <span style="color:var(--muted);font-size:0.8rem" id="api-base"></span>
  </header>
  <div class="layout">
    <nav>
      <button class="active" data-panel="roles">角色</button>
      <button data-panel="policies">DSL 策略</button>
      <button data-panel="authorize">授权测试</button>
      <button data-panel="publish">发布</button>
    </nav>
    <main>
      <section class="panel active" id="panel-roles">
        <h2>角色</h2>
        <div class="card">
          <div class="row">
            <div><label>名称</label><input id="r-name" placeholder="authenticated" /></div>
            <div><label>静态权限 (可选)</label><input id="r-perms" placeholder="orders:select 或 *:*" /></div>
          </div>
          <div class="actions">
            <button class="btn primary" onclick="createRole()">创建</button>
            <button class="btn secondary" onclick="loadRoles()">刷新</button>
          </div>
        </div>
        <div class="card"><div id="roles-list"></div></div>
      </section>

      <section class="panel" id="panel-policies">
        <h2>DSL 策略 (v1)</h2>
        <div class="card">
          <div class="row">
            <div><label>策略名</label><input id="p-name" placeholder="orders_owner_select" /></div>
            <div><label>绑定角色</label><select id="p-role"><option value="">— 选择 —</option></select></div>
          </div>
          <div class="row-3">
            <div><label>Schema</label><input id="p-schema" value="public" /></div>
            <div><label>表名</label><input id="p-table" value="orders" /></div>
            <div><label>字段 (逗号分隔, 用于列 ACL)</label><input id="p-field-names" value="id,user_id,amount,status" oninput="renderFieldACL()" /></div>
          </div>
          <label>CRUD</label>
          <div class="actions" style="margin-bottom:0.75rem">
            <label class="field-item"><input type="checkbox" id="op-select" checked /> select</label>
            <label class="field-item"><input type="checkbox" id="op-insert" /> insert</label>
            <label class="field-item"><input type="checkbox" id="op-update" /> update</label>
            <label class="field-item"><input type="checkbox" id="op-delete" /> delete</label>
          </div>
          <label>行级条件 (when / check)</label>
          <p class="help">select/delete 用 when；insert 用 check；update 两者</p>
          <textarea id="p-conditions">[
  {"left": "input.request.resource.row.user_id", "op": "eq", "right": "input.user.sub"}
]</textarea>
          <label>列级 ACL</label>
          <div id="p-fields" class="field-grid"></div>
          <label>完整 DSL JSON (可编辑)</label>
          <textarea id="p-dsl-json"></textarea>
          <div class="actions">
            <button class="btn secondary" onclick="syncDSLFromForm()">表单 → JSON</button>
            <button class="btn secondary" onclick="previewCompile()">预览 Rego</button>
            <button class="btn primary" onclick="createPolicy()">创建 · 编译 · 发布</button>
            <button class="btn secondary" onclick="loadPolicies()">刷新列表</button>
          </div>
          <pre class="out" id="compile-preview" style="display:none;margin-top:0.75rem"></pre>
        </div>
        <div class="card"><div id="policies-list"></div></div>
      </section>

      <section class="panel" id="panel-authorize">
        <h2>授权测试</h2>
        <div class="card">
          <textarea id="auth-input">{
  "user": { "sub": "user-001", "roles": ["authenticated"] },
  "request": {
    "action": "select",
    "resource": {
      "type": "db",
      "schema": "public",
      "table": "orders",
      "row": { "user_id": "user-001", "amount": 100 },
      "fields": ["amount", "status"]
    }
  }
}</textarea>
          <div class="actions">
            <button class="btn primary" onclick="testAuthorize()">测试</button>
            <button class="btn secondary" onclick="fillDeny()">拒绝案例</button>
          </div>
          <pre class="out" id="auth-result"></pre>
        </div>
      </section>

      <section class="panel" id="panel-publish">
        <h2>发布 Bundle</h2>
        <div class="card">
          <div id="release-info">—</div>
          <div class="actions" style="margin-top:1rem">
            <button class="btn primary" onclick="publish()">发布</button>
            <button class="btn secondary" onclick="loadRelease()">刷新</button>
          </div>
          <pre class="out" id="publish-result"></pre>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const API = location.origin;
    document.getElementById('api-base').textContent = API;
    let rolesCache = [];

    document.querySelectorAll('nav button').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById('panel-' + b.dataset.panel).classList.add('active');
    }));

    function toast(msg, err) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast' + (err ? ' error' : '');
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    async function api(method, path, body) {
      const o = { method, headers: { 'Content-Type': 'application/json', 'X-Actor': 'displayground' } };
      if (body) o.body = JSON.stringify(body);
      const res = await fetch(API + path, o);
      const t = await res.text();
      let d; try { d = JSON.parse(t); } catch { d = t; }
      if (!res.ok) throw new Error(d?.error || t);
      return d;
    }

    function renderFieldACL() {
      const names = document.getElementById('p-field-names').value.split(',').map(s => s.trim()).filter(Boolean);
      document.getElementById('p-fields').innerHTML = names.map(n =>
        `<div class="field-item"><strong>${n}</strong>
          S<input type="checkbox" data-f="${n}" data-op="select" checked />
          I<input type="checkbox" data-f="${n}" data-op="insert" />
          U<input type="checkbox" data-f="${n}" data-op="update" /></div>`).join('');
    }

    function buildDSLBody() {
      const cond = JSON.parse(document.getElementById('p-conditions').value);
      const ops = {};
      if (document.getElementById('op-select').checked) ops.select = { when: cond };
      if (document.getElementById('op-insert').checked) ops.insert = { check: cond };
      if (document.getElementById('op-update').checked) ops.update = { when: cond, check: cond };
      if (document.getElementById('op-delete').checked) ops.delete = { when: cond };
      const fields = {};
      document.querySelectorAll('#p-fields input[type=checkbox]').forEach(cb => {
        const n = cb.dataset.f, op = cb.dataset.op;
        if (!fields[n]) fields[n] = {};
        fields[n][op] = cb.checked;
      });
      return {
        version: 1,
        resource: { type: 'db', schema: document.getElementById('p-schema').value || 'public', table: document.getElementById('p-table').value },
        operations: ops,
        fields: Object.keys(fields).length ? fields : undefined
      };
    }

    function syncDSLFromForm() {
      document.getElementById('p-dsl-json').value = JSON.stringify(buildDSLBody(), null, 2);
    }

    async function loadRoles() {
      const data = await api('GET', '/v1/roles');
      rolesCache = data.roles || [];
      document.getElementById('p-role').innerHTML = '<option value="">—</option>' +
        rolesCache.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
      document.getElementById('roles-list').innerHTML = rolesCache.length
        ? `<table><tr><th>名称</th><th>静态权限</th></tr>${rolesCache.map(r =>
            `<tr><td>${r.name}</td><td>${(r.static_permissions||[]).join(', ')||'—'}</td></tr>`).join('')}</table>`
        : '<p style="color:var(--muted)">暂无</p>';
    }

    async function createRole() {
      try {
        const p = document.getElementById('r-perms').value.trim();
        await api('POST', '/v1/roles', {
          name: document.getElementById('r-name').value,
          static_permissions: p ? p.split(',').map(s => s.trim()) : []
        });
        toast('已创建'); loadRoles();
      } catch (e) { toast(e.message, true); }
    }

    async function previewCompile() {
      try {
        syncDSLFromForm();
        const body = JSON.parse(document.getElementById('p-dsl-json').value);
        const roleId = document.getElementById('p-role').value;
        const roleName = rolesCache.find(r => r.id === roleId)?.name || 'authenticated';
        const data = await api('POST', '/v1/dsl/compile-preview', { body, role_names: [roleName] });
        const el = document.getElementById('compile-preview');
        el.style.display = 'block';
        el.textContent = data.compiled_rego;
      } catch (e) { toast(e.message, true); }
    }

    async function createPolicy() {
      try {
        syncDSLFromForm();
        const roleId = document.getElementById('p-role').value;
        if (!roleId) throw new Error('请选择角色');
        const body = JSON.parse(document.getElementById('p-dsl-json').value);
        const { id } = await api('POST', '/v1/policies', { name: document.getElementById('p-name').value, kind: 'dsl', body });
        await api('POST', `/v1/roles/${roleId}/policies`, { policy_id: id });
        await api('POST', `/v1/policies/${id}/compile`, {});
        await api('PATCH', `/v1/policies/${id}`, { status: 'published' });
        toast('策略已创建并发布'); loadPolicies();
      } catch (e) { toast(e.message, true); }
    }

    async function loadPolicies() {
      try {
        const data = await api('GET', '/v1/policies');
        document.getElementById('policies-list').innerHTML = (data.policies||[]).length
          ? `<table><tr><th>名称</th><th>表</th><th>状态</th></tr>${(data.policies||[]).map(p => {
              const b = typeof p.body === 'string' ? JSON.parse(p.body) : p.body;
              const tbl = b?.resource ? `${b.resource.schema||'public'}.${b.resource.table}` : '—';
              return `<tr><td>${p.name}</td><td>${tbl}</td><td><span class="tag ${p.status}">${p.status}</span></td></tr>`;
            }).join('')}</table>` : '<p style="color:var(--muted)">暂无</p>';
      } catch (e) { toast(e.message, true); }
    }

    async function testAuthorize() {
      try {
        const input = JSON.parse(document.getElementById('auth-input').value);
        const data = await api('POST', '/v1/authorize', input);
        document.getElementById('auth-result').textContent = (data.allow ? 'ALLOW ✓\n' : 'DENY ✗\n') + JSON.stringify(data, null, 2);
      } catch (e) { document.getElementById('auth-result').textContent = e.message; }
    }

    function fillDeny() {
      document.getElementById('auth-input').value = JSON.stringify({
        user: { sub: 'user-002', roles: ['authenticated'] },
        request: { action: 'select', resource: { type: 'db', schema: 'public', table: 'orders',
          row: { user_id: 'user-001' }, fields: ['amount'] } }
      }, null, 2);
    }

    async function loadRelease() {
      const data = await api('GET', '/v1/releases/current');
      document.getElementById('release-info').innerHTML = `revision <strong>${data.revision}</strong> · digest <code>${(data.bundle_digest||'').slice(0,12)}…</code>`;
    }

    async function publish() {
      try {
        const data = await api('POST', '/v1/releases', {});
        document.getElementById('publish-result').textContent = JSON.stringify(data, null, 2);
        toast('已发布'); loadRelease();
      } catch (e) { toast(e.message, true); }
    }

    renderFieldACL(); syncDSLFromForm();
    loadRoles(); loadPolicies(); loadRelease();
  </script>
</body>
</html>
